name: control_center
description: "Multi-Agent Developer Control Center"
publish_to: "none"

version: 0.0.1+1

environment:
  sdk: ">=3.11.0 <4.0.0"

# Native Dart pub workspace. This pubspec is the workspace ROOT (it carries the
# `workspace:` key, so it does NOT set `resolution: workspace` — only members do).
# cc_ui (design system) and cc_gallery (Widgetbook) are the new members alongside
# the existing system_audio_capture plugin. All members share a single
# pubspec.lock resolved in one pass.
workspace:
  - packages/system_audio_capture
  - packages/cc_ui
  - packages/cc_natives
  - packages/cc_domain
  - packages/cc_rpc
  - packages/cc_host
  - packages/cc_infra
  - packages/cc_data
  - packages/cc_persistence
  - packages/cc_mcp
  - packages/cc_mcp_client
  - packages/cc_server_core
  - apps/cc_gallery
  - apps/cc_remote
  - apps/cc_server
  - apps/cc_signaling_server

dependencies:
  sentry_flutter: ^9.21.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # Web: lets `main()` switch the web app to clean path-based URLs
  # (`/workspaces/<id>/…` instead of `/#/…`). Platform-safe — a no-op on
  # desktop. See lib/main.dart.
  flutter_web_plugins:
    sdk: flutter
  intl: ^0.20.2
  # UI
  # In-repo design system (tokens, theme, primitives, components). Workspace
  # member; the app owns every visual component outright.
  cc_ui:
    path: packages/cc_ui
  # NOTE: cc_app_native (the desktop's in-process Drift/SQLite connection) is
  # GONE — the desktop is now a thin client that spawns a local `cc_server`
  # (which owns the database) and talks to it over RPC. The app opens no DB.
  # In-repo Dart FFI surface for the runtime-loaded natives (rift/fff/
  # tree-sitter/aec). Bindings + loaders only — builds no native code; the
  # dylibs are produced by scripts/natives/*.sh. Workspace member.
  cc_natives:
    path: packages/cc_natives
  # Pure-Dart shared contracts (JSON-RPC wire types + DTOs) consumed by both
  # the desktop app and the cc_remote PWA. Workspace member.
  cc_domain:
    path: packages/cc_domain
  # Transport-agnostic RPC client + channel transports (web-safe). The desktop
  # in REMOTE mode, the full web build, and cc_remote dial a cc-server through
  # this. The server half lives in cc_host. Workspace member.
  cc_rpc:
    path: packages/cc_rpc
  # Server-side RPC kernel (VM-only): per-connection sessions, repo-op dispatch,
  # subscriptions, rate limiting, tool policy, WSS server transport. Embedded by
  # the desktop "be your own server" path and apps/cc_server. Workspace member.
  cc_host:
    path: packages/cc_host
  # Server-side VM-only infrastructure adapters (pure dart:io impls of cc_domain
  # ports: git/process/GitHub-CLI, schema validation, adapter/ACP detection).
  # Kept SEPARATE from the cc_host kernel and free of Flutter/cc_natives so both
  # link into the Flutter-free cc_server binary. Workspace member.
  cc_infra:
    path: packages/cc_infra
  # Remote data layer (web-safe): repository adapters that read/write over the
  # cc_rpc client. The data source for the web build + desktop REMOTE mode;
  # desktop LOCAL keeps the Drift repositories. Workspace member.
  cc_data:
    path: packages/cc_data
  # Pure-Dart persistence: the Drift schema (AppDatabase + tables + DAOs) lives
  # here so the same database runs on the desktop and a dart build cli server.
  cc_persistence:
    path: packages/cc_persistence
  # Pure-Dart app-server composition (RPC catalog + LocalRpcServer + event
  # forwarding + secrets port). The desktop's in-process server uses it today;
  # apps/cc_server is the same composition with no Flutter. Workspace member.
  cc_server_core:
    path: packages/cc_server_core
  # The MCP tool surface (agent-facing API). The desktop registers these tools
  # into its local MCP HTTP server; the wiring providers stay in lib but the
  # tool classes + dispatcher live here so the headless cc_server reuses them.
  cc_mcp:
    path: packages/cc_mcp
  # The MCP CLIENT — connects to EXTERNAL MCP servers and bridges their tools
  # into the local registry, plus the cross-cutting tool ecosystem (BM25 tool
  # discovery, capability tiers, config discovery, OAuth, background processes,
  # semantic code search, advisor/watchdog). Pure Dart; links into both the
  # desktop and the headless cc_server.
  cc_mcp_client:
    path: packages/cc_mcp_client
  lucide_icons_flutter: ^3.1.14+2
  flutter_markdown_plus: ^1.0.7
  markdown: ^7.3.1
  highlight: ^0.7.0
  google_fonts: ^8.1.0
  flutter_emoji: ^2.5.1
  flutter_smooth_markdown: ^0.7.2

  # Routing
  go_router: ^17.3.0

  # State Management
  flutter_riverpod: ^3.3.1
  # The Drift/SQLite database lives in cc_persistence (server-side); the desktop
  # is a thin client with zero drift/sqlite imports. The path_provider plugin is
  # pulled transitively (google_fonts) — the app only needs the platform
  # interface directly, to subclass PathProviderPlatform for the font-cache
  # redirect (see core/storage/font_cache_path_provider.dart).
  path_provider_platform_interface: ^2.1.2
  path: ^1.9.1
  uuid: ^4.5.3

  # Browser APIs (localStorage) for the web build's session persistence. Only
  # imported by the web bootstrap (lib/bootstrap/bootstrap_web.dart), never by
  # the desktop bootstrap. Already in the lockfile via the cc_remote PWA member.
  web: ^1.1.1

  # Network
  dio: ^5.9.2
  http: ^1.6.0

  # Diff
  diff_match_patch: ^0.4.1

  # Charts
  fl_chart: ^1.2.0

  # YAML parsing (AGENTS.md/TEAM.md)
  yaml: ^3.1.3

  # Desktop
  # Unified native surface: window control, multi-window, plain (NSUserDefaults/
  # registry/GSettings) storage, URL opening. Replaces window_manager +
  # desktop_multi_window + url_launcher + shared_preferences.
  # NOTE: nativeapi 0.1.x has NO working secure-storage backend (every platform
  # is a stub that no-ops), so secrets stay on flutter_secure_storage below.
  nativeapi: ^0.1.4
  local_notifier: ^0.1.6
  file_selector: ^1.1.0
  hotkey_manager: ^0.2.3

  # Secrets (GitHub/Linear tokens, remote-control PSKs): real OS keychain —
  # macOS/iOS Keychain, Windows Credential Manager, Linux libsecret. nativeapi's
  # SecureStorage is unimplemented, so this dedicated plugin backs SecureStore.
  flutter_secure_storage: ^10.3.1

  # Utils
  crypto: ^3.0.7
  collection: ^1.19.1
  # Non-secret storage (shared_preferences) and URL opening (url_launcher) are
  # now provided by `nativeapi` (see the Desktop section); secrets use
  # flutter_secure_storage (nativeapi's secure store is an unimplemented stub).
  html: ^0.15.6
  flutter_inappwebview: ^6.1.5
  record: ^7.0.0
  # Driver-free system-output (loopback) audio capture for meeting notes.
  # Local plugin: Core Audio taps (macOS), WASAPI loopback (Windows),
  # PipeWire/PulseAudio monitor (Linux).
  system_audio_capture:
    path: packages/system_audio_capture
  # On-device inference (sherpa_onnx / onnxruntime_v2 / dart_wordpiece) moved
  # into the pure-Dart cc_natives package; the app pulls them transitively via
  # its cc_natives dependency. lib/ holds zero on-device-inference code now.
  video_player: ^2.11.1
  audioplayers: ^6.7.1
  chewie: ^1.14.1
  # WebRTC for the remote-control transport (one DataChannel per paired
  # phone carries JSON-RPC). DataChannel-only — no camera/mic. Heavy native
  # xcframework; see macos Podfile minimum.
  flutter_webrtc: ^1.4.1
  # Pure-Dart QR widget for the remote-control pairing QR code.
  qr_flutter: ^4.1.0
  flutter_svg: ^2.3.0

  # Terminal emulator (xterm.dart) + host-side PTY
  xterm: ^4.0.0
  # IDE-style resizable multi-pane layout (sidebar + tabbed editor groups with
  # programmatic split). https://pub.dev/packages/panes
  panes: ^1.3.0
  flutter_pty: ^0.4.2

  kalender: ^0.18.6
dev_dependencies:
  sentry_dart_plugin: ^3.4.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation — build_runner drives mockito mock generation for tests.
  build_runner: ^2.15.0
  mockito: ^5.6.4

  test: any
  riverpod: any
  patchwork: ^0.3.0
  hooks: ^1.0.3
flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/ide_logos/
    - assets/logo.svg
    - assets/sandbox/seccomp/
    - assets/sounds/
    - assets/models/silero-vad/

  # The app bundles NO fonts of its own. Both defaults — Manrope (UI) and Fira
  # Code (code) — are owned by the cc_ui package and resolved by their
  # `packages/cc_ui/<family>` name via AppFonts (which aliases CcFonts). This is
  # the single-copy setup: see packages/cc_ui/pubspec.yaml + cc_fonts.dart.
  # google_fonts is reserved for user-selected families only.
  shaders:
    - assets/shaders/login_background_dark.frag
    - assets/shaders/login_background_light.frag
    - assets/shaders/dashboard_background_dark.frag
    - assets/shaders/dashboard_background_light.frag

sentry:
  upload_debug_symbols: true
  upload_source_maps: true
  project: control-center
  org: parced
