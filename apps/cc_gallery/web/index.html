<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Component gallery for the Control Center design system (cc_ui).">
  <meta name="color-scheme" content="light dark">

  <!-- Theme color tracks the active surface (warm near-white / ink-black). -->
  <meta name="theme-color" content="#fcfbf9" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#171614" media="(prefers-color-scheme: dark)">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Control Center">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon — SVG preferred by modern browsers, PNG fallback otherwise. -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" href="favicon.png">

  <title>cc_ui — Control Center design system</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
