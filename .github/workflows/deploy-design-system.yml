name: Deploy design system

# Builds the cc_ui Widgetbook gallery (apps/cc_gallery) and deploys it to the
# Cloudflare Worker "control-center-design-system" as static assets — the same
# model as the docs site. Config lives in apps/cc_gallery/wrangler.jsonc.
#
# Setup — add one repository secret:
#   CLOUDFLARE_API_TOKEN  A Cloudflare API token scoped to "Edit Cloudflare
#                         Workers" for the account below.
# The account id is not sensitive, so it is inlined. `wrangler deploy` creates
# the Worker on first run if it does not already exist.

on:
  push:
    branches: [main]
    # Only redeploy when the gallery or the design system it showcases changes.
    paths:
      - "apps/cc_gallery/**"
      - "packages/cc_ui/**"
      - ".github/workflows/deploy-design-system.yml"
  workflow_dispatch:

permissions: {}

concurrency:
  group: deploy-design-system
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: d7dccdb80e94309a90054ed9c182ba05
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.cloudflare.com:443
            github.com:443
            pub.dev:443
            registry.npmjs.org:443
            sparrow.cloudflare.com:443
            storage.googleapis.com:443

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: main
          flutter-version-file: .fvmrc # single source of truth — synced via fvm
          cache: true

      - name: Resolve dependencies
        working-directory: apps/cc_gallery
        run: flutter pub get

      - name: Generate Widgetbook navigation
        working-directory: apps/cc_gallery
        # Regenerate main.directories.g.dart so a deploy never ships a stale
        # navigation tree, even if the committed file lags the use-cases.
        run: dart run build_runner build

      - name: Build web
        working-directory: apps/cc_gallery
        run: flutter build web --release

      - name: Deploy to Cloudflare
        working-directory: apps/cc_gallery
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx --yes wrangler@4.98.0 deploy
