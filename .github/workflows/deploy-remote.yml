name: Deploy remote client

# Builds the cc_remote phone PWA (apps/cc_remote) and deploys it to the
# Cloudflare Worker "control-center-remote" as static assets — the same model as
# the design system. Config lives in apps/cc_remote/wrangler.jsonc (SPA fallback
# + the strict CSP `_headers` shipped under web/).
#
# Setup — reuses the existing repository secret:
#   CLOUDFLARE_API_TOKEN  A Cloudflare API token scoped to "Edit Cloudflare
#                         Workers" for the account below.
# The account id is not sensitive, so it is inlined. `wrangler deploy` creates
# the Worker on first run if it does not already exist.

on:
  push:
    branches: [main]
    # Redeploy when the phone client or the shared packages it bundles change.
    paths:
      - "apps/cc_remote/**"
      - "packages/cc_ui/**"
      - "packages/cc_domain/**"
      - ".github/workflows/deploy-remote.yml"
  workflow_dispatch:

permissions: {}

concurrency:
  group: deploy-remote
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      CLOUDFLARE_ACCOUNT_ID: d7dccdb80e94309a90054ed9c182ba05
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.cloudflare.com:443
            github.com:443
            pub.dev:443
            registry.npmjs.org:443
            sparrow.cloudflare.com:443
            storage.googleapis.com:443

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: main
          flutter-version-file: .fvmrc # single source of truth — synced via fvm
          cache: true

      - name: Resolve dependencies
        working-directory: apps/cc_remote
        run: flutter pub get

      - name: Build web
        working-directory: apps/cc_remote
        run: flutter build web --release

      - name: Deploy to Cloudflare
        working-directory: apps/cc_remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx --yes wrangler@4.98.0 deploy
