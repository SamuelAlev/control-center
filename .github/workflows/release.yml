name: Release

# Builds desktop binaries for macOS (DMG — Developer ID signed + notarized;
# the macOS job's MACOS_CERTIFICATE/MACOS_PROVISIONING_PROFILE_BASE64/APPLE_*
# secrets are required — the profile authorizes keychain-access-groups so the app
# launches on MDM-managed Macs), Windows (Inno
# Setup exe — Authenticode-signed when a cert secret is present, else unsigned)
# and Linux (AppImage), attaches them to a DRAFT GitHub Release with SHA-256 checksums,
# and attaches an OIDC SLSA build-provenance attestation to each artifact.
#
# Trigger by pushing a version tag (e.g. `git tag v1.0.0 && git push --tags`),
# or run manually from the Actions tab (workflow_dispatch) supplying a version.
# The release is created as a DRAFT — review the artifacts, then publish.
#
# The heavy lifting lives in scripts/ so this file stays readable:
#   scripts/natives/build_natives.sh            build rift + fff + tree-sitter + aec (macOS/Linux)
#   scripts/release/windows_natives.sh  build fff + tree-sitter + aec (Windows)
#   scripts/release/macos_package.sh    embed + sign + DMG + notarize
#   scripts/release/linux_package.sh    bundle + AppImage + tarball
#   scripts/release/make_release.sh     assemble + notes + draft release
# Native builds are non-fatal: a failure degrades the feature at runtime
# (git-worktree fallback / Dart file search / no code graph). rift is not built
# on Windows.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build, e.g. 1.0.0 (defaults to pubspec version)"
        required: false

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Resolve version
        id: v
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
          else
            version="${{ github.event.inputs.version }}"
            if [ -z "$version" ]; then
              version="$(grep -m1 '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//' | cut -d'+' -f1)"
            fi
            tag="v${version}"
          fi
          echo "Resolved version=$version tag=$tag"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  build-macos:
    needs: prepare
    runs-on: macos-14 # Apple Silicon (arm64)
    permissions:
      contents: read
      id-token: write # OIDC for build-provenance attestation
      attestations: write
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      BUILD_NUMBER: ${{ github.run_number }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: main
          flutter-version-file: .fvmrc # single source of truth — synced via fvm
          cache: true

      - name: Use CocoaPods (disable Swift Package Manager for a reliable clean build)
        run: flutter config --no-enable-swift-package-manager

      - name: Install create-dmg + AEC build tools (meson/ninja)
        run: brew install create-dmg meson ninja
      - name: Resolve dependencies
        run: flutter pub get
      - name: Code generation (drift / json_serializable)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build native FFI libraries (rift + fff + tree-sitter + aec)
        continue-on-error: true
        run: bash scripts/natives/build_natives.sh build/natives

      - name: Build macOS release
        run: flutter build macos --release --build-name="$VERSION" --build-number="$BUILD_NUMBER"

      - name: Package (embed + sign + DMG + notarize)
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.MACOS_PROVISIONING_PROFILE_BASE64 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: bash scripts/release/macos_package.sh "$VERSION"

      # Standalone, self-hostable cc_server (the backend web/phone thin clients
      # dial). Reuses the natives in build/natives + the cc_server bundle the
      # desktop package already built, signs/notarizes it on its own, and emits a
      # downloadable archive. The keychain macos_package.sh set up is still on the
      # search list, so the script finds the Developer ID identity.
      - name: Package standalone cc_server (sign + notarize)
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: bash scripts/release/cc_server_package.sh "$VERSION" macos

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            Control-Center-${{ env.VERSION }}-arm64.dmg
            cc_server-${{ env.VERSION }}-macos-arm64.tar.gz

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: macos
          path: |
            Control-Center-*-arm64.dmg
            Control-Center-*-arm64.dmg.sha256
          if-no-files-found: error

      - name: Upload standalone cc_server (macOS)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cc_server-macos
          path: |
            cc_server-*-macos-*.tar.gz
            cc_server-*-macos-*.tar.gz.sha256
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  build-windows:
    needs: prepare
    runs-on: windows-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      BUILD_NUMBER: ${{ github.run_number }}
      # Pinned native sources — keep in sync with scripts/natives/build_fff.sh + scripts/natives/build_tree_sitter.sh.
      FFF_REF: 8092cfa3faf3471d29b3e11049e921d7e759d789 # dmtrKovalenko/fff v0.9.3
      TREE_SITTER_REF: 7f534862c3ec939c3a6ee147f7600ef5c1bf900f # tree-sitter v0.26.9
      TS_DART_REF: a9bdfa3db2fbc9b9f12c93450d04a671f33a5102 # tree-sitter-dart (master)
      TS_JAVASCRIPT_REF: 44c892e0be055ac465d5eeddae6d3e194424e7de # tree-sitter-javascript v0.25.0
      TS_TYPESCRIPT_REF: f975a621f4e7f532fe322e13c4f79495e0a7b2e7 # tree-sitter-typescript v0.23.2
      TS_PHP_REF: 5b5627faaa290d89eb3d01b9bf47c3bb9e797dea # tree-sitter-php v0.24.2
      # WebRTC AEC3 source pin — keep in sync with scripts/natives/build_aec.sh.
      WAP_REF: d0569cfa50c1858ee279d77b3fc8870be6902441 # webrtc-audio-processing v2.1
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: main
          flutter-version-file: .fvmrc # single source of truth — synced via fvm
          cache: true

      # Put the MSVC toolchain (cl.exe / link.exe) on PATH for the bash native
      # build step. Without this, windows_natives.sh's `cl`-reachability guard
      # fails and the AEC3 DLL is silently skipped — leaving Windows with no
      # signal-stage AEC. msvc-dev-cmd exports the VS dev environment to
      # GITHUB_ENV/GITHUB_PATH so later steps (including the bash shell) inherit
      # it; meson's --vsenv then finds the toolchain for the webrtc build.
      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
        with:
          arch: x64

      - name: Install AEC build tools (meson/ninja)
        run: pip install meson ninja

      - name: Resolve dependencies
        run: flutter pub get
      - name: Code generation (drift / json_serializable)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build native FFI libraries (fff + tree-sitter + aec; no rift on Windows)
        continue-on-error: true
        shell: bash
        run: bash scripts/release/windows_natives.sh

      - name: Build Windows release
        run: flutter build windows --release --build-name="$env:VERSION" --build-number="$env:BUILD_NUMBER"

      - name: Bundle native DLLs beside the executable
        shell: bash
        run: |
          set -e
          OUT="build/windows/x64/runner/Release"
          shopt -s nullglob
          for f in build/natives/*.dll; do echo "  bundling $(basename "$f")"; cp -f "$f" "$OUT/"; done
          # Tree-sitter .scm queries beside the grammar DLLs (GrammarManager
          # resolves each language's query from the same dir as its lib).
          for q in build/natives/*.scm; do echo "  bundling $(basename "$q")"; cp -f "$q" "$OUT/"; done

      - name: Bundle cc_server thin-client backend
        shell: bash
        run: |
          set -e
          OUT="build/windows/x64/runner/Release"
          # The desktop spawns this at boot (CcServerLauncher resolves
          # <exeDir>/cc_server/bin/cc_server.exe) and talks to it over loopback
          # RPC — it owns the database. The installer's recursive [Files] glob
          # over the Release dir picks it up.
          ( cd apps/cc_server && dart build cli )
          BUNDLE="apps/cc_server/build/cli/windows_x64/bundle"
          rm -rf "$OUT/cc_server"
          mkdir -p "$OUT/cc_server"
          cp -r "$BUNDLE/." "$OUT/cc_server/"
          # Native DLLs the server loads (libccpty for the agent PTY, etc.) —
          # Windows resolves them beside the cc_server.exe.
          for f in build/natives/*.dll; do cp -f "$f" "$OUT/cc_server/bin/"; done
          # Tree-sitter .scm queries beside the grammar DLLs (code indexer).
          for q in build/natives/*.scm; do cp -f "$q" "$OUT/cc_server/bin/"; done

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup -y --no-progress }
          & $iscc "/DAppVersion=$env:VERSION" "windows/installer/control_center.iss"
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed ($LASTEXITCODE)" }

      - name: Authenticode sign (only when a code-signing cert is present)
        shell: pwsh
        env:
          WINDOWS_CERT: ${{ secrets.WINDOWS_CERT }}
          WINDOWS_CERT_PWD: ${{ secrets.WINDOWS_CERT_PWD }}
        run: |
          if (-not $env:WINDOWS_CERT) { Write-Host "No Authenticode cert — installer ships unsigned (SmartScreen will warn)."; exit 0 }
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\cert.pfx", [Convert]::FromBase64String($env:WINDOWS_CERT))
          $exe = Get-ChildItem dist -Filter *-setup.exe | Select-Object -First 1
          & signtool sign /f "$env:RUNNER_TEMP\cert.pfx" /p $env:WINDOWS_CERT_PWD `
            /tr http://timestamp.digicert.com /td sha256 /fd sha256 $exe.FullName

      - name: Checksum
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist -Filter *-setup.exe | Select-Object -First 1
          $hash = (Get-FileHash $exe.FullName -Algorithm SHA256).Hash.ToLower()
          "$hash  $($exe.Name)" | Out-File -Encoding ascii "$($exe.FullName).sha256"

      # Standalone, self-hostable cc_server. Reuses the cc_server bundle built in
      # the "Bundle cc_server thin-client backend" step + build/natives, and emits
      # a downloadable .zip. Windows builds are unsigned (matches the installer).
      - name: Package standalone cc_server
        shell: bash
        run: bash scripts/release/cc_server_package.sh "$VERSION" windows

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/Control-Center-*-x64-setup.exe
            cc_server-*-windows-x64.zip

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows
          path: |
            dist/Control-Center-*-x64-setup.exe
            dist/Control-Center-*-x64-setup.exe.sha256
          if-no-files-found: error

      - name: Upload standalone cc_server (Windows)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cc_server-windows
          path: |
            cc_server-*-windows-*.zip
            cc_server-*-windows-*.zip.sha256
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      BUILD_NUMBER: ${{ github.run_number }}
      ARCH: x86_64
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            *.archive.ubuntu.com:80
            *.microsoft.com:443
            api.github.com:443
            dl.google.com:443
            esm.ubuntu.com:443
            fulcio.sigstore.dev:443
            github.com:443
            index.crates.io:443
            pub.dev:443
            rekor.sigstore.dev:443
            release-assets.githubusercontent.com:443
            static.crates.io:443
            static.rust-lang.org:443
            storage.googleapis.com:443

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          # System libs required by the plugins' Linux CMake (pkg_check_modules)
          # plus curl/zlib for the bundled sentry-native build. meson+ninja build
          # the WebRTC AEC3 dylib (scripts/natives/build_aec.sh).
          sudo apt-get install -y \
            clang cmake meson ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libblkid-dev libfuse2 \
            libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            libsecret-1-dev \
            libkeybinder-3.0-dev libnotify-dev \
            libcurl4-openssl-dev zlib1g-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: main
          flutter-version-file: .fvmrc # single source of truth — synced via fvm
          cache: true

      - name: Resolve dependencies
        run: flutter pub get
      - name: Code generation (drift / json_serializable)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build native FFI libraries (rift + fff + tree-sitter + aec)
        continue-on-error: true
        run: bash scripts/natives/build_natives.sh build/natives

      - name: Build Linux release
        run: flutter build linux --release --build-name="$VERSION" --build-number="$BUILD_NUMBER"

      - name: Package (bundle + AppImage + tarball + checksums)
        run: bash scripts/release/linux_package.sh "$VERSION"

      # Standalone, self-hostable cc_server. Reuses the cc_server bundle
      # linux_package.sh already built + build/natives, and emits a downloadable
      # .tar.gz. This same archive feeds the cc_server Docker image (containers job).
      - name: Package standalone cc_server
        run: bash scripts/release/cc_server_package.sh "$VERSION" linux

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            Control-Center-${{ env.VERSION }}-x86_64.AppImage
            Control-Center-${{ env.VERSION }}-linux-x64.tar.gz
            cc_server-${{ env.VERSION }}-linux-x64.tar.gz

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: linux
          path: |
            Control-Center-*-x86_64.AppImage
            Control-Center-*-linux-x64.tar.gz
            Control-Center-*.sha256
          if-no-files-found: error

      - name: Upload standalone cc_server (Linux)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cc_server-linux
          path: |
            cc_server-*-linux-*.tar.gz
            cc_server-*-linux-*.tar.gz.sha256
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  release:
    needs: [prepare, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      TAG: ${{ needs.prepare.outputs.tag }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            uploads.github.com:443

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Create draft release (assemble + checksums + notes)
        run: bash scripts/release/make_release.sh

  # ---------------------------------------------------------------------------
  # Container images → GHCR: the self-hostable backend (cc-server) + the two
  # static thin clients (web + phone PWA). Independent of the desktop release;
  # the Cloudflare deploys (deploy-webapp.yml / deploy-remote.yml) are unchanged
  # — these are the self-hostable Docker alternative. Reuses the standalone
  # cc_server Linux archive build-linux already produced (no native rebuilds).
  containers:
    needs: [prepare, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push images + attestations to GHCR
      id-token: write # OIDC for the SLSA build-provenance attestation
      attestations: write
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          # audit, not block: docker base-image pulls (debian / nginx) hit
          # variable Docker Hub + GHCR CDN hosts that can't be reliably
          # enumerated. harden-runner still records every egress for the dashboard.
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Resolve image namespace (GHCR requires a lowercase owner)
        id: ns
        shell: bash
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          channel: main
          flutter-version-file: .fvmrc # single source of truth — synced via fvm
          cache: true

      # Mirrors deploy-webapp.yml / deploy-remote.yml (pub get + build web, no
      # codegen) — the proven recipe for the static bundles these images serve.
      - name: Build web client (root app)
        run: |
          flutter pub get
          flutter build web --release

      - name: Build phone PWA (cc_remote)
        working-directory: apps/cc_remote
        run: |
          flutter pub get
          flutter build web --release

      - name: Download standalone cc_server (Linux)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cc_server-linux
          path: artifacts/cc_server-linux

      - name: Stage docker build contexts
        shell: bash
        run: |
          set -euo pipefail
          # cc-server: extract the standalone Linux bundle (binary + sqlite3 +
          # natives staged in bin/lib) into the image context.
          mkdir -p docker/cc_server/bundle
          tar xzf artifacts/cc_server-linux/cc_server-*-linux-x64.tar.gz \
            -C docker/cc_server/bundle --strip-components=1
          # web + cc_remote: copy the pre-built static bundles beside their
          # Dockerfiles (a tiny, self-contained build context each).
          mkdir -p docker/web/site docker/cc_remote/site
          cp -R build/web/. docker/web/site/
          cp -R apps/cc_remote/build/web/. docker/cc_remote/site/

      - name: Log in to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Build + push cc-server image
        id: cc_server
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: docker/cc_server
          push: true
          tags: |
            ghcr.io/${{ steps.ns.outputs.owner }}/cc-server:${{ env.VERSION }}
            ghcr.io/${{ steps.ns.outputs.owner }}/cc-server:latest
          # We attach a signed Sigstore attestation below (matches the desktop
          # binaries, verifiable with `gh attestation verify`), so disable
          # buildkit's separate inline provenance manifest.
          provenance: false

      - name: Attest cc-server image
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ steps.ns.outputs.owner }}/cc-server
          subject-digest: ${{ steps.cc_server.outputs.digest }}
          push-to-registry: true

      - name: Build + push web client image
        id: web
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: docker/web
          push: true
          tags: |
            ghcr.io/${{ steps.ns.outputs.owner }}/control-center-web:${{ env.VERSION }}
            ghcr.io/${{ steps.ns.outputs.owner }}/control-center-web:latest
          provenance: false

      - name: Attest web client image
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ steps.ns.outputs.owner }}/control-center-web
          subject-digest: ${{ steps.web.outputs.digest }}
          push-to-registry: true

      - name: Build + push phone PWA image
        id: remote
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: docker/cc_remote
          push: true
          tags: |
            ghcr.io/${{ steps.ns.outputs.owner }}/control-center-remote:${{ env.VERSION }}
            ghcr.io/${{ steps.ns.outputs.owner }}/control-center-remote:latest
          provenance: false

      - name: Attest phone PWA image
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ steps.ns.outputs.owner }}/control-center-remote
          subject-digest: ${{ steps.remote.outputs.digest }}
          push-to-registry: true
