# Static nginx config for the Control Center WEB CLIENT (self-hosted Docker).
#
# In production the web client is served by a Cloudflare Worker (worker/csp.js)
# that stamps a DYNAMIC, per-request CSP naming the connected cc-server origin
# (read from the cc_proxy_origin cookie). nginx can't compute that per-request
# without scripting, so this self-hosted image ships a PRAGMATIC STATIC CSP:
# connect-src / img-src are widened to `https:` + `ws:`/`wss:` so the client can
# reach whatever cc-server host the user types at connect time. That is LOOSER
# than the Worker's cookie-scoped policy — fine for a self-hosted single-tenant
# deployment; front this with the Worker (or your own edge) if you need the
# tighter per-request policy.
#
# Listens on 8080 (unprivileged) — the base image runs nginx as a non-root user.

# Per-path Cache-Control, evaluated against the (post-try_files) $uri so every
# index.html response — root, deep route, or the file itself — plus the
# version-orchestrating entry files always revalidate. Flutter's main.dart.js is
# not content-hashed, so the service worker owns versioning. An empty value adds
# no header (nginx skips empty add_header values), leaving hashed assets to the
# browser's default heuristic caching.
map $uri $cc_cache_control {
    default                       "";
    /index.html                   "no-cache";
    /flutter_bootstrap.js         "no-cache";
    /flutter_service_worker.js    "no-cache";
    /manifest.json                "no-cache";
}

server {
    listen      8080;
    listen      [::]:8080;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # gzip text-like assets (Flutter ships .js/.json/.wasm uncompressed).
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript application/json
                    application/wasm image/svg+xml application/manifest+json;

    # Security headers — mirror web/_headers; the dynamic per-request CSP is
    # replaced by the static pragmatic one. `always` so they ride error responses
    # too. All header directives stay at the server level (a location with its
    # own add_header would drop these), with cache control driven by the map.
    add_header X-Content-Type-Options  "nosniff" always;
    add_header Referrer-Policy         "no-referrer" always;
    add_header Permissions-Policy      "camera=(), microphone=(self), display-capture=(self), geolocation=(), payment=(), usb=(), accelerometer=(), gyroscope=(), magnetometer=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' https://www.gstatic.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' ws: wss: https:; worker-src 'self' blob:; manifest-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'none'" always;
    add_header Cache-Control            $cc_cache_control always;

    # SPA fallback: client-side routing + deep links (the pairing fragment)
    # resolve to the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
