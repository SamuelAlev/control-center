# Static nginx config for the Control Center phone PWA (cc_remote, self-hosted).
#
# cc_remote already ships a STATIC CSP (apps/cc_remote/web/_headers — no dynamic
# Worker), so this mirrors it almost verbatim: connect-src is limited to `wss:`
# (the operator-configured WebRTC signaling broker) + gstatic, NOT widened. The
# pairing PSK lives in IndexedDB, so the tight egress policy matters — see the
# _headers file for the full rationale. To pin the broker, replace `wss:` with
# your exact broker origin (e.g. wss://broker.example.com).
#
# Listens on 8080 (unprivileged) — the base image runs nginx as a non-root user.

# Per-path Cache-Control over the (post-try_files) $uri: every index.html
# response + the version-orchestrating entry files always revalidate; an empty
# value adds no header (nginx skips empty add_header values).
map $uri $cc_cache_control {
    default                       "";
    /index.html                   "no-cache";
    /flutter_bootstrap.js         "no-cache";
    /flutter_service_worker.js    "no-cache";
    /manifest.json                "no-cache";
}

server {
    listen      8080;
    listen      [::]:8080;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript application/json
                    application/wasm image/svg+xml application/manifest+json;

    # Security headers — mirror apps/cc_remote/web/_headers verbatim (its CSP is
    # already static). `always` so they ride error responses; all header
    # directives stay at the server level, with cache control via the map.
    add_header X-Content-Type-Options  "nosniff" always;
    add_header Referrer-Policy         "no-referrer" always;
    add_header Permissions-Policy      "camera=(), microphone=(self), display-capture=(self), geolocation=(), payment=(), usb=(), accelerometer=(), gyroscope=(), magnetometer=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' https://www.gstatic.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' wss: https://www.gstatic.com; worker-src 'self' blob:; manifest-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'none'" always;
    add_header Cache-Control            $cc_cache_control always;

    # SPA fallback: go_router owns routing; deep links (the pairing fragment)
    # resolve to the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
